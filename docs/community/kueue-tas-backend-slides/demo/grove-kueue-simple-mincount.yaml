# Grove PodCliqueSet demonstrating Kueue partial admission via minCount.
# frontend requests replicas=4 with minAvailable=2. Each Pod requests 1 CPU and
# the demo ClusterQueue only has 2 CPU of quota, so Kueue admits the Workload at
# minCount=2 and leaves the other 2 Pods gated: 2 of 4 Pods run.
# With WORKERS=1 (control-plane + worker) and required: host, the 2 admitted Pods
# land on 2 distinct nodes.
# Apply after setup-kueue-kind-demo.sh.
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: grove-kueue-mincount
  labels:
    app: grove-kueue-mincount
    kueue.x-k8s.io/queue-name: grove-poc
spec:
  replicas: 1
  template:
    topologyConstraint:
      topologyName: grove-kind-topology
      pack:
        required: host
    cliques:
    - name: frontend
      spec:
        roleName: frontend
        replicas: 4
        minAvailable: 2
        podSpec:
          schedulerName: kueue
          terminationGracePeriodSeconds: 5
          containers:
          - name: pause
            image: registry.k8s.io/pause:3.9
            resources:
              requests:
                cpu: "1"
                memory: 64Mi
