name: "E2E Setup"
description: "Install all tools and dependencies needed to run E2E tests"

inputs:
  go-version:
    description: "Go version to install"
    required: false
    default: "1.26.3"  # Keep in sync with .github/workflows/build-check-test.yaml

runs:
  using: "composite"
  steps:
    - name: Install OS packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
        cache-dependency-path: operator/go.sum

    - name: Pin GOROOT to active Go
      shell: bash
      run: echo "GOROOT=$(env -u GOROOT go env GOROOT)" >> "$GITHUB_ENV"

    - name: Add repo tools to PATH
      shell: bash
      run: |
        echo "${GITHUB_WORKSPACE}/hack/tools/bin" >> "$GITHUB_PATH"

    - name: Cache e2e CLI tools
      uses: actions/cache@v4
      with:
        path: hack/tools/bin
        key: ${{ runner.os }}-${{ runner.arch }}-e2e-tools-${{ hashFiles('hack/tools.mk') }}

    - name: Install e2e CLI tools
      shell: bash
      run: |
        make -C operator \
          "${GITHUB_WORKSPACE}/hack/tools/bin/k3d" \
          "${GITHUB_WORKSPACE}/hack/tools/bin/kubectl" \
          "${GITHUB_WORKSPACE}/hack/tools/bin/helm" \
          "${GITHUB_WORKSPACE}/hack/tools/bin/skaffold" \
          "${GITHUB_WORKSPACE}/hack/tools/bin/jq" \
          "${GITHUB_WORKSPACE}/hack/tools/bin/yq"

    - name: Install uv
      shell: bash
      run: |
        if command -v uv &>/dev/null; then
          echo "uv already installed: $(uv --version)"
        else
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        fi

    - name: Sync Python dependencies
      shell: bash
      working-directory: operator
      # uv sync provisions the Python version pinned by .python-version and
      # installs the locked dependencies into operator/.venv. Pre-warming here
      # surfaces resolve/install failures in a labeled step and keeps subsequent
      # `make` targets fast.
      run: uv sync --locked
