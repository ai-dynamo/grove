name: Scale Test CI

on:
  push:
    branches:
      - scale-test-ci

permissions:
  contents: write

env:
  HISTORY_BRANCH: scale-test-history-test

jobs:
  select-scale-test-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.select.outputs.mode }}
    steps:
      - name: Select scale test mode
        id: select
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          message="$(printf '%s' "${COMMIT_MESSAGE}" | tr '[:upper:]' '[:lower:]')"
          wants_fake=false
          wants_real=false

          if [[ "${message}" == *fake-scale-test* ]]; then
            wants_fake=true
          fi
          if [[ "${message}" == *run-scale-test* ]]; then
            wants_real=true
          fi

          if [[ "${wants_fake}" == "true" && "${wants_real}" == "true" ]]; then
            echo "::error::Commit message must contain only one scale-test mode: fake-scale-test or run-scale-test"
            exit 1
          fi

          mode=none
          if [[ "${wants_fake}" == "true" ]]; then
            mode=fake
          elif [[ "${wants_real}" == "true" ]]; then
            mode=real
          fi

          echo "Selected scale-test mode: ${mode}"
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"

  fake-scale-test:
    needs: select-scale-test-mode
    if: needs.select-scale-test-mode.outputs.mode == 'fake'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate fake scale result
        env:
          OUT_DIR: ${{ runner.temp }}/grove-scale
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          tz = timezone.utc
          start = datetime.now(tz).replace(microsecond=0)
          run_id = start.strftime("run-%Y%m%d-%H%M%S")
          out_dir = Path(os.environ["OUT_DIR"]) / "ScaleTest_1000" / run_id
          out_dir.mkdir(parents=True, exist_ok=True)

          run_number = int(os.environ.get("GITHUB_RUN_NUMBER", "0"))
          profiles = [
              {
                  "deploy": 0.62,
                  "pods_created": 0.36,
                  "pods_ready": 0.59,
                  "pcs_available": 0.61,
                  "delete": 0.35,
                  "pcs_deleted": 0.34,
              },
              {
                  "deploy": 0.74,
                  "pods_created": 0.44,
                  "pods_ready": 0.70,
                  "pcs_available": 0.73,
                  "delete": 0.42,
                  "pcs_deleted": 0.39,
              },
              {
                  "deploy": 0.55,
                  "pods_created": 0.31,
                  "pods_ready": 0.52,
                  "pcs_available": 0.54,
                  "delete": 0.31,
                  "pcs_deleted": 0.29,
              },
              {
                  "deploy": 0.88,
                  "pods_created": 0.49,
                  "pods_ready": 0.82,
                  "pcs_available": 0.87,
                  "delete": 0.47,
                  "pcs_deleted": 0.44,
              },
          ]
          profile = profiles[run_number % len(profiles)]

          deploy_start = start
          pods_created = deploy_start + timedelta(seconds=profile["pods_created"])
          pods_ready = deploy_start + timedelta(seconds=profile["pods_ready"])
          pcs_available = deploy_start + timedelta(seconds=profile["pcs_available"])
          deploy_end = deploy_start + timedelta(seconds=profile["deploy"])
          delete_start = deploy_end
          pcs_deleted = delete_start + timedelta(seconds=profile["pcs_deleted"])
          delete_end = delete_start + timedelta(seconds=profile["delete"])

          result = {
              "testName": "ScaleTest_1000",
              "runID": run_id,
              "namespace": "default",
              "pcsCount": 1,
              "groveImage": "fake-ci/grove-operator:scale-test-smoke",
              "phases": [
                  {
                      "name": "deploy",
                      "startTime": deploy_start.isoformat(),
                      "endTime": deploy_end.isoformat(),
                      "durationFromTestStartSeconds": 0.0,
                      "milestones": [
                          {
                              "name": "pods-created",
                              "timestamp": pods_created.isoformat(),
                              "durationFromPhaseStartSeconds": (pods_created - deploy_start).total_seconds(),
                          },
                          {
                              "name": "pods-ready",
                              "timestamp": pods_ready.isoformat(),
                              "durationFromPhaseStartSeconds": (pods_ready - deploy_start).total_seconds(),
                          },
                          {
                              "name": "pcs-available",
                              "timestamp": pcs_available.isoformat(),
                              "durationFromPhaseStartSeconds": (pcs_available - deploy_start).total_seconds(),
                          },
                      ],
                  },
                  {
                      "name": "delete",
                      "startTime": delete_start.isoformat(),
                      "endTime": delete_end.isoformat(),
                      "durationFromTestStartSeconds": (delete_start - start).total_seconds(),
                      "milestones": [
                          {
                              "name": "pcs-deleted",
                              "timestamp": pcs_deleted.isoformat(),
                              "durationFromPhaseStartSeconds": (pcs_deleted - delete_start).total_seconds(),
                          }
                      ],
                  },
              ],
              "testDurationSeconds": (delete_end - start).total_seconds(),
              "k8sClient": {"qps": 100, "burst": 150},
              "controllerMaxReconcile": {
                  "podCliqueSet": 20,
                  "podCliqueScalingGroup": 20,
                  "podClique": 20,
              },
          }

          result_path = out_dir / "scale-test-results.json"
          result_path.write_text(json.dumps(result, indent=2) + "\n")
          print(f"wrote {result_path}")
          print(f"using fake timing profile {run_number % len(profiles)}")
          PY

      - name: Store fake scale result
        env:
          HISTORY_REPO: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          ./operator/hack/scale-history.py branch \
            --input "${RUNNER_TEMP}/grove-scale" \
            --repo "${HISTORY_REPO}" \
            --workdir "${RUNNER_TEMP}/grove-scale-history" \
            --branch "${HISTORY_BRANCH}" \
            --commit "${GITHUB_SHA}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  run-scale-test:
    needs: select-scale-test-mode
    if: needs.select-scale-test-mode.outputs.mode == 'real'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GROVE_E2E_PYROSCOPE_DISABLED: "true"
    steps:
      - name: Print runner specs
        run: |
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h | awk '/^Mem:/ {print $2}')"

      - name: Checkout
        uses: actions/checkout@v4

      - name: E2E setup
        uses: ./.github/actions/e2e-setup
        with:
          go-version: "1.26.1"

      # Compile before cluster setup so KWOK nodes are fresh when the test starts.
      # KWOK nodes can become NotReady if the Go build runs after creation.
      - name: Compile scale test
        working-directory: operator
        run: |
          go test -c -tags=e2e ./e2e/tests/scale -o "${RUNNER_TEMP}/scale.test"

      - name: Create scale cluster
        working-directory: operator
        run: |
          make scale-cluster-up E2E_CREATE_FLAGS='--dind-memory-mode --set pyroscope.enabled=false --set grove.profiling=false'

      - name: Run scale test
        working-directory: operator/e2e/tests/scale
        env:
          GROVE_E2E_DIAG_DIR: ${{ runner.temp }}/grove-scale
          GROVE_E2E_DIAG_MODE: file
        run: |
          "${RUNNER_TEMP}/scale.test" -test.v -test.timeout=30m

      - name: Store scale result
        if: success()
        env:
          HISTORY_REPO: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          ./operator/hack/scale-history.py branch \
            --input "${RUNNER_TEMP}/grove-scale" \
            --repo "${HISTORY_REPO}" \
            --workdir "${RUNNER_TEMP}/grove-scale-history" \
            --branch "${HISTORY_BRANCH}" \
            --commit "${GITHUB_SHA}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Collect scale cluster diagnostics
        if: failure()
        env:
          DEBUG_DIR: ${{ runner.temp }}/scale-cluster-debug
        run: |
          mkdir -p "${DEBUG_DIR}"

          {
            echo "## docker ps"
            docker ps -a || true
            echo
            echo "## k3d clusters"
            k3d cluster list || true
            echo
            echo "## helm releases"
            helm list -A || true
            echo
            echo "## nodes"
            kubectl get nodes -o wide || true
            echo
            echo "## pods"
            kubectl get pods -A -o wide || true
            echo
            echo "## events"
            kubectl get events -A --sort-by=.lastTimestamp || true
          } > "${DEBUG_DIR}/summary.txt" 2>&1

          kubectl describe nodes > "${DEBUG_DIR}/nodes-describe.txt" 2>&1 || true
          kubectl describe pods -A > "${DEBUG_DIR}/pods-describe.txt" 2>&1 || true
          kubectl get all -A -o yaml > "${DEBUG_DIR}/all-resources.yaml" 2>&1 || true
          kubectl get validatingwebhookconfiguration,mutatingwebhookconfiguration -o yaml > "${DEBUG_DIR}/webhooks.yaml" 2>&1 || true
          helm status grove-operator -n grove-system > "${DEBUG_DIR}/helm-grove-operator.txt" 2>&1 || true
          helm status kai-scheduler -n kai-scheduler > "${DEBUG_DIR}/helm-kai-scheduler.txt" 2>&1 || true
          helm status pyroscope -n pyroscope > "${DEBUG_DIR}/helm-pyroscope.txt" 2>&1 || true
          kubectl logs -n grove-system -l app.kubernetes.io/name=grove-operator --all-containers=true --tail=-1 > "${DEBUG_DIR}/grove-operator.log" 2>&1 || true

      - name: Upload scale cluster diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scale-cluster-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/scale-cluster-debug/
          if-no-files-found: warn
          retention-days: 7

      - name: Cleanup scale cluster
        if: always()
        working-directory: operator
        run: |
          make scale-cluster-down || true
