---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: clustertopologies.grove.io
spec:
  group: grove.io
  names:
    kind: ClusterTopology
    listKind: ClusterTopologyList
    plural: clustertopologies
    shortNames:
    - ct
    singular: clustertopology
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterTopology defines the topology hierarchy for the cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the topology hierarchy specification.
            properties:
              levels:
                description: |-
                  Levels is an ordered list of topology levels from broadest to narrowest scope.
                  The order in this list defines the hierarchy (index 0 = broadest level).
                items:
                  description: |-
                    TopologyLevel defines a single level in the topology hierarchy.
                    Maps a platform-agnostic domain to a platform-specific node label key,
                    allowing workload operators a consistent way to reference topology levels when defining TopologyConstraint's.
                  properties:
                    domain:
                      description: |-
                        Domain is a topology level identifier used in TopologyConstraint references.
                        Administrators can use any name that describes their infrastructure hierarchy.
                        Well-known conventions: region, zone, datacenter, block, rack, host, numa
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z][a-z0-9-]*$
                      type: string
                    key:
                      description: |-
                        Key is the node label key that identifies this topology domain.
                        Must be a valid Kubernetes qualified label key.
                        Examples: "topology.kubernetes.io/zone", "kubernetes.io/hostname"
                      maxLength: 316
                      minLength: 1
                      pattern: ^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]/)?([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$
                      type: string
                  required:
                  - domain
                  - key
                  type: object
                minItems: 1
                type: array
                x-kubernetes-validations:
                - message: domain must be unique across all levels
                  rule: self.all(x, self.filter(y, y.domain == x.domain).size() ==
                    1)
                - message: key must be unique across all levels
                  rule: self.all(x, self.filter(y, y.key == x.key).size() == 1)
              schedulerReferences:
                description: |-
                  SchedulerReferences maps this topology to scheduler backend topology resources.
                  When empty, the operator automatically creates and manages the scheduler backend topology.
                  When provided, the referenced resources are assumed to be externally managed and
                  the operator compares the domain/key pairs and their order against the ClusterTopology
                  levels, reporting any mismatch via the SchedulerTopologyDrift condition.
                items:
                  description: SchedulerReference maps a ClusterTopology to a scheduler
                    backend's topology resource.
                  properties:
                    reference:
                      description: Reference is the name of the scheduler backend's
                        topology resource.
                      type: string
                    schedulerName:
                      description: SchedulerName is the name of the scheduler backend
                        (e.g., "kai-scheduler").
                      type: string
                  required:
                  - reference
                  - schedulerName
                  type: object
                type: array
            required:
            - levels
            type: object
          status:
            description: Status defines the observed state of the ClusterTopology.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the ClusterTopology's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: |-
                  ObservedGeneration is the metadata.generation of the ClusterTopology that was last reconciled.
                  Consumers can compare this to metadata.generation to determine whether the status is up to date.
                format: int64
                type: integer
              schedulerTopologyStatuses:
                description: SchedulerTopologyStatuses reports the per-backend sync
                  state for each scheduler reference.
                items:
                  description: |-
                    SchedulerTopologyStatus reports the sync state between this ClusterTopology and a single
                    scheduler backend's topology resource.
                  properties:
                    inSync:
                      description: InSync is true when the scheduler backend topology
                        levels match the ClusterTopology levels.
                      type: boolean
                    message:
                      description: Message provides detail when InSync is false (e.g.,
                        describing the mismatch).
                      type: string
                    reference:
                      description: Reference is the scheduler backend topology resource
                        name (matches SchedulerReference.Reference).
                      type: string
                    schedulerBackendTopologyObservedGeneration:
                      description: |-
                        SchedulerBackendTopologyObservedGeneration is the metadata.generation of the scheduler backend
                        topology resource that was last compared. Allows consumers to verify the comparison is current.
                        Zero if the resource was not found.
                      format: int64
                      type: integer
                    schedulerName:
                      description: SchedulerName is the scheduler backend name (matches
                        SchedulerReference.SchedulerName).
                      type: string
                  required:
                  - inSync
                  - reference
                  - schedulerName
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
