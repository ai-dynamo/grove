# Workload: ZL1 - Zone-Level Topology Constraint
# Test scenario: PCS with zone constraint (widest domain), PCLQ without constraint
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: tas-standalone-pclq
  labels:
    app: tas-standalone-pclq
spec:
  replicas: 1
  template:
    topologyConstraint:
      packDomain: zone
    cliques:
      - name: worker
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: worker
          replicas: 4
          minAvailable: 4
          podSpec:
            terminationGracePeriodSeconds: 5
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: type
                          operator: In
                          values:
                            - kwok
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: grove.io/podclique
                          operator: In
                          values:
                            - tas-standalone-pclq-0-worker
                    topologyKey: kubernetes.io/hostname
            tolerations:
              - key: fake-node
                operator: Equal
                value: "true"
                effect: NoSchedule
            containers:
              - name: worker
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 40Mi
