# Workload: SP8 - Large Scaling Ratio
# Test scenario: PCS with block constraint, PCSG with replicas=10/minAvailable=3, PCLQ with host constraint
---
apiVersion: grove.io/v1alpha1
kind: ClusterTopology
metadata:
  name: e2e-topology
spec:
  levels:
    - domain: zone
      key: kubernetes.io/zone
    - domain: block
      key: kubernetes.io/block
    - domain: rack
      key: kubernetes.io/rack
    - domain: host
      key: kubernetes.io/hostname
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: tas-large-scale
  labels:
    app: tas-large-scale
spec:
  replicas: 1
  template:
    topologyConstraint:
      topologyName: e2e-topology
      packDomain: block
    podCliqueScalingGroups:
      - name: workers
        replicas: 10
        minAvailable: 3
        topologyConstraint:
        cliqueNames:
          - worker
    cliques:
      - name: worker
        labels:
          kai.scheduler/queue: test
        topologyConstraint:
          packDomain: host
        spec:
          roleName: worker
          replicas: 2
          minAvailable: 2
          podSpec:
            terminationGracePeriodSeconds: 5
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: worker
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 40Mi
