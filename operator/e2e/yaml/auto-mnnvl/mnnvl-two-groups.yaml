# MNNVL E2E: PCS "default" with two standalone GPU PCLQs in different groups
# g1 inherits PCS "default", g2 overrides to "train"
# Used by: testMultipleGroupsInOnePCS
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: mnnvl-two-groups
  annotations:
    grove.io/mnnvl-group: "default"
spec:
  replicas: 2
  template:
    terminationDelay: 1s
    cliques:
      - name: g1
        spec:
          roleName: g1
          replicas: 1
          minAvailable: 1
          podSpec:
            containers:
              - name: gpu
                image: busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  limits:
                    nvidia.com/gpu: "1"
      - name: g2
        annotations:
          grove.io/mnnvl-group: "train"
        spec:
          roleName: g2
          replicas: 1
          minAvailable: 1
          podSpec:
            containers:
              - name: gpu
                image: busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  limits:
                    nvidia.com/gpu: "1"
