# Multi-Topology Test: Two workloads using different ClusterTopologies
# - topology-a: 3 levels (zone, rack, host) - workload-a packs at rack level
# - topology-b: 2 levels (block, host) - workload-b packs at host level
---
apiVersion: grove.io/v1alpha1
kind: ClusterTopology
metadata:
  name: topology-a
spec:
  levels:
    - domain: zone
      key: kubernetes.io/zone
    - domain: rack
      key: kubernetes.io/rack
    - domain: host
      key: kubernetes.io/hostname
---
apiVersion: grove.io/v1alpha1
kind: ClusterTopology
metadata:
  name: topology-b
spec:
  levels:
    - domain: block
      key: kubernetes.io/block
    - domain: host
      key: kubernetes.io/hostname
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: tas-multi-topo-a
  labels:
    app: tas-multi-topo-a
spec:
  replicas: 1
  template:
    topologyConstraint:
      topologyName: topology-a
      packDomain: rack
    cliques:
      - name: worker
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: worker
          replicas: 2
          minAvailable: 2
          podSpec:
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: worker
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 40Mi
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: tas-multi-topo-b
  labels:
    app: tas-multi-topo-b
spec:
  replicas: 1
  template:
    topologyConstraint:
      topologyName: topology-b
    cliques:
      - name: worker
        labels:
          kai.scheduler/queue: test
        topologyConstraint:
          packDomain: host
        spec:
          roleName: worker
          replicas: 2
          minAvailable: 2
          podSpec:
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: worker
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 40Mi
