apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: volcano-gang-qa-negative-queue
  annotations:
    scheduling.grove.io/volcano-queue: qa-volcano-e2e
spec:
  replicas: 1
  template:
    cliques:
      - name: worker-a
        annotations:
          scheduling.grove.io/volcano-queue: qa-volcano-e2e
        spec:
          roleName: worker-a
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: worker-a
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
      - name: worker-b
        annotations:
          scheduling.grove.io/volcano-queue: default
        spec:
          roleName: worker-b
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: worker-b
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
