apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: volcano-gang-qa-unschedulable
spec:
  replicas: 1
  template:
    cliques:
      - name: ready
        spec:
          roleName: ready
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: ready
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
      - name: blocked
        spec:
          roleName: blocked
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            nodeSelector:
              volcano-gang-qa/unschedulable: "true"
            containers:
              - name: blocked
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
