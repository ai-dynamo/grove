apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: volcano-gang-qa-negative-topology
  annotations:
    scheduling.grove.io/volcano-queue: qa-volcano-e2e
spec:
  replicas: 1
  template:
    topologyConstraint:
      topologyName: grove-topology
      packDomain: rack
    cliques:
      - name: worker
        spec:
          roleName: worker
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: worker
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
