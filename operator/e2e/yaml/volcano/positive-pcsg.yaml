apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: volcano-gang-qa-pcsg
  annotations:
    scheduling.grove.io/volcano-queue: qa-volcano-e2e
spec:
  replicas: 1
  template:
    podCliqueScalingGroups:
      - name: workers
        replicas: 2
        minAvailable: 2
        cliqueNames:
          - prefill
          - decode
    cliques:
      - name: coordinator
        spec:
          roleName: coordinator
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: coordinator
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
      - name: prefill
        spec:
          roleName: prefill
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: prefill
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
      - name: decode
        spec:
          roleName: decode
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: volcano
            terminationGracePeriodSeconds: 1
            containers:
              - name: decode
                image: alpine
                imagePullPolicy: IfNotPresent
                command: ["sh", "-c", "sleep 3600"]
                resources:
                  requests:
                    cpu: 5m
                    memory: 16Mi
