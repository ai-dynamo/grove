# Scale Test: 5000-pod MoE workload
# 2500 PCS replicas × 1 scaling group with 2 expert-worker pods = 5000 pods
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: scale-test-5000-moe
  labels:
    app: scale-test-5000-moe
spec:
  replicas: 2500
  template:
    cliques:
      - name: expert-worker
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: expert
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: expert-worker
                image: registry:5001/nginx:alpine-slim
                resources:
                  requests:
                    memory: 10Mi
      - name: router
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: router
          replicas: 1
          minAvailable: 1
          podSpec:
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: router
                image: registry:5001/nginx:alpine-slim
                resources:
                  requests:
                    memory: 10Mi
    podCliqueScalingGroups:
      - name: moe-group
        replicas: 1
        minAvailable: 1
        cliqueNames:
          - expert-worker
          - router
