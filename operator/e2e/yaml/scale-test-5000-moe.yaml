# Scale Test: 5000-pod MoE workload
# 2500 PCS replicas × 1 scaling group with 2 expert-worker pods = 5000 pods
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: scale-test-5000-moe
  labels:
    app: scale-test-5000-moe
spec:
  replicas: 2500
  template:
    cliques:
      - name: expert-worker
        spec:
          roleName: expert
          replicas: 2
          minAvailable: 2
          podSpec:
            schedulerName: default-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: type
                          operator: In
                          values:
                            - kwok
            tolerations:
              - key: fake-node
                operator: Equal
                value: "true"
                effect: NoSchedule
            containers:
              - name: expert-worker
                image: registry:5001/nginx:alpine-slim
                resources:
                  requests:
                    memory: 10Mi
